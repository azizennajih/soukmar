<div class="auth-page fade-in">
  <div class="auth-card card">

    <a routerLink="/" class="auth-logo">
      <div class="auth-logo__icon">S</div>
      <span>Souk<em>Mar</em></span>
    </a>

    <h1 class="auth-title">Créer un compte</h1>
    <p class="auth-sub">Rejoignez des milliers d'acheteurs et vendeurs</p>

    @if (error) { <div class="auth-error">{{ error }}</div> }

    <form (ngSubmit)="submit()" class="auth-form">
      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" [(ngModel)]="form.name" name="name" placeholder="Mohammed Alami" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" name="email" placeholder="votre&#64;email.com" required />
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" [(ngModel)]="form.phone" name="phone" placeholder="+212 6 00 00 00 00" />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-icon-wrap">
          <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="form.password" name="password" placeholder="Minimum 6 caractères" required style="padding-right:2.8rem" />
          <button type="button" class="input-eye" (click)="showPass=!showPass">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" [(ngModel)]="form.confirm" name="confirm" placeholder="••••••••" required />
      </div>

      <p class="auth-terms">
        En créant un compte, vous acceptez nos <a href="#">CGU</a> et notre <a href="#">Politique de confidentialité</a>.
      </p>

      <button type="submit" class="btn-primary auth-submit" [disabled]="loading">
        @if (loading) { <span class="spinner"></span> }
        Créer mon compte
      </button>
    </form>

    <p class="auth-switch">
      Déjà un compte ? <a routerLink="/auth/login">Se connecter</a>
    </p>
  </div>
</div>
